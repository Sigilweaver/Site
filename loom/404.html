<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Sigilweaver Loom</title>
    <meta name="description"
        content="The page you're looking for seems to have vanished into the digital ether. Let us guide you back to the magic.">
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/loom/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/loom/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/loom/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/loom/icons/apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="/loom/icons/sigilweaver-logo.svg">

    <!-- Self-hosted Fonts -->
    <link rel="stylesheet" href="/loom/fonts/inter.css">
</head>

<body
    class="bg-gradient-to-b from-mystic-900 to-mystic-700 text-white min-h-screen flex items-center justify-center relative overflow-hidden font-mystical">
    <!-- Skip Link -->
    <a href="#main-content"
        class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-gold-500 text-mystic-900 px-4 py-2 rounded-md z-50 font-semibold">
        Skip to main content
    </a>

    <!-- Floating Background Elements -->
    <div class="absolute inset-0 pointer-events-none">
        <div
            class="floating-orb absolute top-1/4 left-1/4 w-20 h-20 bg-gradient-to-r from-mystic-500 to-gold-400 rounded-full opacity-20">
        </div>
        <div
            class="floating-orb absolute top-3/4 right-1/4 w-32 h-32 bg-gradient-to-r from-gold-400 to-mystic-500 rounded-full opacity-15">
        </div>
        <div
            class="floating-orb absolute top-1/2 left-3/4 w-16 h-16 bg-gradient-to-r from-mystic-400 to-gold-300 rounded-full opacity-25">
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="text-center z-10 px-6 max-w-2xl mx-auto">
        <div class="mb-8">
            <a href="/loom/" class="inline-flex items-center space-x-3 mb-6 group hover:opacity-80 transition-opacity">
                <img src="/loom/icons/sigilweaver-logo.svg" alt="Sigilweaver Loom Logo" width="48" height="48"
                    class="opacity-90 group-hover:opacity-100 transition-opacity">
                <span
                    class="text-2xl font-bold text-mystic-200 group-hover:text-gold-400 transition-colors">Sigilweaver Loom</span>
            </a>
        </div>

        <div
            class="text-8xl md:text-9xl font-bold mb-6 bg-gradient-to-b from-mystic-300 to-mystic-600 bg-clip-text text-transparent">
            404
        </div>

        <h1 class="text-3xl md:text-4xl font-bold mb-4 text-mystic-200">
            Lost in the Digital Realm
        </h1>

        <p class="text-lg md:text-xl text-mystic-300 mb-8 leading-relaxed">
            The page you seek has vanished into the digital ether. Even our most powerful data weaving spells cannot
            locate it.
            But fear not—let us guide you back to the path of enlightenment.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center mb-12">
            <a href="/loom/"
                class="bg-gradient-to-r from-mystic-600 to-mystic-500 hover:from-mystic-500 hover:to-mystic-400 px-8 py-4 rounded-lg text-lg font-semibold transition-all transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-gold-400 focus:ring-opacity-50">
                Return Home
            </a>
        </div>
    </main>

    <!-- Scripts -->
    <script type="module" src="/src/pages/error.ts"></script>
</body>

</html>
